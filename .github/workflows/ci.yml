name: CI - MLflow Project Retrain & Docker

# Advanced Kriteria 3: retrain model via MLflow Project saat trigger,
# upload artefak model ke repo (GitHub), lalu build & push Docker image
# menggunakan `mlflow models build-docker`.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4 joblib==1.4.2

      - name: Run MLflow Project (retrain)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name Telco_Churn_CI \
            -P n_estimators=300 -P max_depth=10

      - name: Read run id
        id: runid
        working-directory: MLProject
        run: echo "RUN_ID=$(cat run_id.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/mlruns/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image from MLflow model
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.runid.outputs.RUN_ID }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-ci" \
            --env-manager local

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-ci"
